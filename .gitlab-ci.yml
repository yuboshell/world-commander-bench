# Private GitLab Pages: publishes the self-contained report.html as the site,
# restricted to project members (set pages_access_level=private on the project).
# report.html embeds all images, so the "build" is just a copy — no toolchain.
image: alpine:latest

pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp report.html public/index.html
    - cp -f home.html public/home.html
    - cp -f plans.html public/plans.html 2>/dev/null || true          # per-project research plans (linked from home)
    - cp -f style.css public/style.css                               # shared Jon Barron stylesheet
    - cp sc2.html public/sc2.html
    - cp -f embodiment.html public/embodiment.html 2>/dev/null || true
    - cp -f motion.html public/motion.html 2>/dev/null || true
    - cp -f graph-bpe-motion.html public/graph-bpe-motion.html 2>/dev/null || true  # standalone (graph-tokenization thread, not E1-E4)
    - cp -f literature.html public/literature.html 2>/dev/null || true
    - cp -f ideation.html public/ideation.html 2>/dev/null || true   # ideation page (abstract + idea + outlook)
    - cp -f proposal.html public/proposal.html 2>/dev/null || true   # redirect stub -> ideation.html
    - cp -rf fig public/ 2>/dev/null || true                         # proposal blog images (command-station.png, svgs)
    - cp -rf people public/ 2>/dev/null || true                      # member portraits (home.html)
    - cp -rf survey public/ 2>/dev/null || true                      # full survey CSV (literature.html download link)
    - cp -f desk_demo.mp4 public/ 2>/dev/null || true
    - cp -f sc2_latency.png public/ 2>/dev/null || true
    - cp -f sc2_demo.mp4 public/ 2>/dev/null || true
    - cp -f sc2_demo_poster.jpg public/ 2>/dev/null || true
    - cp -f sc2_demo_game.SC2Replay public/ 2>/dev/null || true
    - cp -f sc2_real_game.mp4 public/ 2>/dev/null || true
    - cp -f sc2_real_game_poster.jpg public/ 2>/dev/null || true
    - cp -f scene*.jpg public/ 2>/dev/null || true
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
